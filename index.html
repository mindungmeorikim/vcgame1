<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>택배 분류 게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game" id="game">
    <header class="top-bar">
      <div class="status-card">🏆 점수: <span id="score">0</span></div>
      <h1>📦 택배 분류 게임</h1>
      <div class="status-card">❤️ 실수: <span id="mistakes">0</span> / 5</div>
    </header>

    <section class="warehouse" id="warehouse">
      <div class="combo" id="combo">COMBO x2</div>
      <div class="warning" id="warning">🚨 위험! 빨리 분류하세요!</div>

      <div class="machine">
        <div class="alarm" id="alarm">🚨</div>
        <div class="door"></div>
      </div>

      <div class="conveyor">
        <div id="box" class="box">
          <div id="boxLabel" class="box-label">일반</div>
        </div>
      </div>

      <div class="bins">
        <button class="bin green" data-type="일반">일반 📦</button>
        <button class="bin blue" data-type="냉장">냉장 ❄️</button>
        <button class="bin orange" data-type="파손주의">파손주의 🍷</button>
      </div>
    </section>

    <p id="message">게임 시작을 눌러주세요!</p>
    <button id="startBtn">게임 시작</button>
  </main>

  <div id="rankingModal" class="ranking-modal">
    <div class="ranking-content">
      <h2>🏆 게임 종료</h2>
      <p>최종 점수: <strong id="finalScore">0</strong>점</p>

      <input
        type="text"
        id="nickname"
        maxlength="10"
        placeholder="닉네임 입력"
      />

      <button id="saveScoreBtn">점수 등록</button>
      <button id="restartBtn">다시 시작</button>

      <h3>랭킹 TOP 10</h3>
      <ol id="rankingList"></ol>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
